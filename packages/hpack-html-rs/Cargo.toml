[package]
name = "hpack-html"
version = "0.1.0"
edition = "2021"
description = "High-performance .hpack HTML packet decompressor"
license = "Apache-2.0"
authors = ["Andre Ferreira <andrehrf@gmail.com>"]
repository = "https://github.com/andrehrferreira/hpack-html"
keywords = ["html", "compression", "deflate", "crawler", "hpack"]
categories = ["compression", "web-programming"]
readme = "README.md"

[dependencies]
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
crc32fast = "1"

[dev-dependencies]
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
