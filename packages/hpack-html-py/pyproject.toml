[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hpack-html"
version = "0.1.0"
description = "High-performance .hpack HTML packet decompressor for Python"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{ name = "Andre Ferreira", email = "andrehrf@gmail.com" }]
keywords = ["html", "compression", "deflate", "crawler", "hpack"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: System :: Archiving :: Compression",
]

[project.urls]
Homepage = "https://github.com/andrehrferreira/hpack-html"
Repository = "https://github.com/andrehrferreira/hpack-html"
Issues = "https://github.com/andrehrferreira/hpack-html/issues"

[tool.pytest.ini_options]
testpaths = ["tests"]
