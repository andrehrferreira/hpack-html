name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: bun install
      - run: bun run test
      - name: Build hpack-html
        run: cd packages/hpack-html && bunx tsup src/index.ts --format esm,cjs --dts --clean
      - name: Build hpack-html-js
        run: cd packages/hpack-html-js && bunx tsup src/index.ts --format esm,cjs --dts --clean
      - name: Publish hpack-html
        run: cd packages/hpack-html && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish hpack-html-js
        run: cd packages/hpack-html-js && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish hpack-html
        run: cd packages/hpack-html-rs && cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

  publish-pub:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Publish hpack_html
        run: cd packages/hpack-html-dart && dart pub publish --force
